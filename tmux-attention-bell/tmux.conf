# Claude Code tmux integration
# Source this from your .tmux.conf:
#   source-file ~/.claude/tmux.conf

# React to bells from background windows (cascading Claude notifications):
# flag the window where the bell landed, but only when it isn't the focused one.
set-window-option -g monitor-bell on
set-option -g bell-action other
set-window-option -g window-status-bell-style 'bg=red,fg=white'

# Emit vs eat the bell byte (^G / BEL) itself:
#   emit (visual-bell off) = pass the bell UP to the enclosing terminal/tmux.
#                            This is what lets an inner/remote session's bell
#                            cascade outward to a session wrapping it.
#   eat  (visual-bell on)  = react locally (window still reddens) but DON'T
#                            forward the bell, so the outermost terminal — e.g.
#                            your Mac's iTerm — doesn't beep or bounce the dock.
# Default is emit. To make a machine eat instead — typically the OUTERMOST one
# you actually watch — drop a marker file:  touch ~/.claude/tmux-eat-bell
if-shell '[ -e "$HOME/.claude/tmux-eat-bell" ]' \
    'set-option -g visual-bell on' \
    'set-option -g visual-bell off'
