name: shellcheck

on:
  push:
  pull_request:

jobs:
  shellcheck:
    runs-on: ubuntu-latest   # shellcheck is preinstalled on GitHub's ubuntu image
    steps:
      - uses: actions/checkout@v4
      - name: Lint every shell script (found by shebang, not extension)
        run: |
          # Detect scripts by a first-line #!...sh shebang so extensionless
          # gadgets (e.g. clear-claude) are covered and READMEs/YAML are not.
          files=()
          while IFS= read -r -d '' f; do
            IFS= read -r first < "$f" || continue
            case "$first" in '#!'*sh*) files+=("$f") ;; esac
          done < <(find . -path ./.git -prune -o -type f -print0)
          if [ ${#files[@]} -eq 0 ]; then echo "no shell scripts found"; exit 0; fi
          printf 'Linting:\n'; printf '  %s\n' "${files[@]}"
          shellcheck "${files[@]}"
